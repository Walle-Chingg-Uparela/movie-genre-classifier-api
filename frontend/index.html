<!-- frontend/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Movie Genre Classifier</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="overlay"></div>

    <div class="container">

        <h1>🎬 Movie Genre Classifier</h1>

        <p class="subtitle">
            Predict movie genres using AI and Natural Language Processing
        </p>

        <div class="card">

            <label>Movie Title</label>

            <input
                type="text"
                id="title"
                placeholder="Enter movie title..."
            />

            <label>Movie Plot</label>

            <textarea
                id="plot"
                placeholder="Write the movie plot here..."
            ></textarea>

            <label>Release Year</label>

            <input
                type="number"
                id="year"
                placeholder="2024"
            />

            <button onclick="predictGenre()">
                Predict Genres
            </button>

        </div>

        <div class="results" id="results"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
